name: track
on:
  schedule:
    # Daily. The suite is 35 short prompts against 16 models — cents a day —
    # and a weekly point makes a chart you can't read for a month. Daily also
    # means a real regression shows up within a day instead of within a week.
    - cron: "17 8 * * *"      # every day at 08:17 UTC
  workflow_dispatch:           # or run it by hand from the Actions tab
# Two probes must never run at once. Not for correctness - the commit step
# rebases and retries, so nothing is lost - but because each run is ~1,700 real
# API calls, and an overlap spends that twice to record two points hours apart
# on a chart whose x-axis is days. Queue instead of cancelling: a run already
# in flight has already spent the money.
concurrency:
  group: probe
  cancel-in-progress: false

permissions:
  contents: write              # to commit the updated RESULTS.md
  issues: write                # to open a regression alert issue
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e .

      - name: Probe the models that have a key set
        env:
          # Each is optional — the runner skips any model whose key is absent,
          # so you fund exactly the models you add here as secrets.
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          EVAL_HISTORY_WRITE_KEY: ${{ secrets.EVAL_HISTORY_WRITE_KEY }}
        run: python -m modeldrift.run

      - name: Report — update standings, alert only on a regression
        id: report
        run: |
          python -m modeldrift.report \
            --results RESULTS.md \
            --alert "$RUNNER_TEMP/alert.md" \
            --draft "$RUNNER_TEMP/draft.md"

      - name: Commit the updated standings
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add RESULTS.md dashboard/metrics.json dashboard/narrative.json
          git diff --cached --quiet && { echo "nothing changed"; exit 0; }
          git commit -m "chore: update drift standings [skip ci]"
          # A push landing on main while the probe was running used to lose the
          # entire run: this push was rejected as non-fast-forward and `|| true`
          # swallowed it, so a job that had just spent 560 API calls reported
          # success and saved nothing. Rebase onto whatever arrived, then retry.
          for attempt in 1 2 3; do
            if git push; then echo "pushed on attempt $attempt"; exit 0; fi
            echo "push rejected - rebasing onto origin/main and retrying"
            git pull --rebase origin main || exit 1
          done
          echo "::error::could not push this run's results after 3 attempts"
          exit 1

      # ── news, not schedule: the next two only fire on a real regression ──
      - name: Open a regression alert issue
        if: steps.report.outputs.regressed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          title=$(head -1 "$RUNNER_TEMP/alert.md")
          body=$(tail -n +3 "$RUNNER_TEMP/alert.md")
          # Ensure the label exists first. A missing 'drift' label made
          # `gh issue create --label drift` fail, and the trailing `|| true`
          # swallowed it — so a real regression opened no issue at all. Create
          # it (idempotent), then let a genuine failure surface instead of hiding.
          gh label create drift --color b7761a \
            --description "Automated model-drift regression alert" --force >/dev/null 2>&1 || true
          gh issue create --title "$title" --body "$body" --label drift

      - name: Upload the ready-to-post draft (post it by hand, if it's worth saying)
        if: steps.report.outputs.regressed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: social-draft
          path: ${{ runner.temp }}/draft.md
