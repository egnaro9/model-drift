name: track
on:
  schedule:
    - cron: "17 8 * * 1"      # every Monday 08:17 UTC
  workflow_dispatch:           # or run it by hand from the Actions tab
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e .
      - name: Probe the models that have a key set
        env:
          # Each is optional — the runner skips any model whose key is absent,
          # so you fund exactly the models you choose to add here as secrets.
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          EVAL_HISTORY_WRITE_KEY: ${{ secrets.EVAL_HISTORY_WRITE_KEY }}
        run: python -m modeldrift.run
